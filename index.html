<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Mode Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:#f1f5f9;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:#fff;
  padding:20px;
  text-align:center;
}

header h1{font-size:24px;}
header p{font-size:14px;opacity:0.8}

/* TOP BAR */
#topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#fff;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:10;
}

#timer{
  font-weight:bold;
  font-size:18px;
  color:#2563eb;
}

#timer.danger{
  color:#dc2626;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4;}
}

#progress{
  font-size:14px;
  color:#64748b;
}

/* PROGRESS BAR */
#progress-bar{
  height:6px;
  background:#e2e8f0;
}
#progress-fill{
  height:6px;
  width:0%;
  background:#2563eb;
  transition:0.3s;
}

/* QUESTIONS */
.card{
  background:#fff;
  margin:12px;
  border-radius:10px;
  border:2px solid #e2e8f0;
  padding:15px;
}

.card.answered{border-color:#22c55e;}
.card.unanswered{border-color:#ef4444;}

.option{
  display:block;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #e2e8f0;
  cursor:pointer;
}

.option:hover{background:#eff6ff;}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:12px 30px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
button:hover{background:#1d4ed8;}

/* RESULT */
#result{
  display:none;
  text-align:center;
  padding:30px;
}

.score{
  font-size:48px;
  color:#2563eb;
  font-weight:800;
}
</style>
</head>

<body>

<header>
<h1>HTML & Computer Basics Exam</h1>
<p>150 Questions • 150 Marks • 120 Minutes</p>
</header>

<div id="topbar">
<div id="timer">⏱ 120:00</div>
<div id="progress">0 / 150</div>
<button onclick="confirmSubmit()">Submit</button>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<form id="quiz"></form>

<div style="text-align:center;margin:20px;">
<button onclick="confirmSubmit()">Final Submit</button>
</div>

<div id="result"></div>

<script>

// ================= QUESTIONS =================
let htmlQuestions = [
{q:"HTML stands for?",opts:["HyperText Markup Language","HighText Machine Language","Hyper Tool","None"],ans:0},
{q:"Which tag creates link?",opts:["&lt;a&gt;","&lt;link&gt;","&lt;href&gt;","&lt;url&gt;"],ans:0},
{q:"Which tag inserts image?",opts:["&lt;img&gt;","&lt;image&gt;","&lt;pic&gt;","&lt;src&gt;"],ans:0},
];

// fill to 100
while(htmlQuestions.length<100){
 htmlQuestions.push({
  q:"HTML Question "+(htmlQuestions.length+1),
  opts:["Option A","Option B","Option C","Option D"],
  ans:Math.floor(Math.random()*4)
 });
}

let compQuestions = [
{q:"CPU full form?",opts:["Central Processing Unit","Control Unit","Computer Unit","Core Unit"],ans:0},
{q:"RAM full form?",opts:["Random Access Memory","Read Memory","Run Memory","Rapid Memory"],ans:0},
];

// fill to 50
while(compQuestions.length<50){
 compQuestions.push({
  q:"Computer Question "+(compQuestions.length+1),
  opts:["Option A","Option B","Option C","Option D"],
  ans:Math.floor(Math.random()*4)
 });
}

let all=[...htmlQuestions,...compQuestions];

// ================= BUILD =================
let answers = JSON.parse(localStorage.getItem("answers")||"{}");
const quiz=document.getElementById("quiz");

all.forEach((q,i)=>{
 let div=document.createElement("div");
 div.className="card";
 div.id="card"+i;

 let opts=q.opts.map((o,j)=>`
  <label class="option">
   <input type="radio" name="q${i}" value="${j}"
    ${answers[i]==j?"checked":""}
    onchange="saveAnswer(${i},${j})">
   ${o}
  </label>
 `).join("");

 div.innerHTML=`<b>Q${i+1}. ${q.q}</b>${opts}`;
 quiz.appendChild(div);

 if(answers[i]!=undefined){
   div.classList.add("answered");
 }
});

updateProgress();

// ================= SAVE =================
function saveAnswer(i,val){
 answers[i]=val;
 localStorage.setItem("answers",JSON.stringify(answers));

 document.getElementById("card"+i).classList.add("answered");
 updateProgress();
}

// ================= PROGRESS =================
function updateProgress(){
 let count=Object.keys(answers).length;
 document.getElementById("progress").innerText = count+" / 150";
 document.getElementById("progress-fill").style.width=(count/150*100)+"%";
}

// ================= TIMER =================
let time=120*60;
let timerEl=document.getElementById("timer");

let timer=setInterval(()=>{
 time--;
 let m=Math.floor(time/60);
 let s=time%60;

 timerEl.innerText=`⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

 if(time<=300) timerEl.classList.add("danger");

 if(time<=0){
   clearInterval(timer);
   submitQuiz();
 }
},1000);

// ================= SUBMIT =================
function confirmSubmit(){

 let unanswered=150-Object.keys(answers).length;

 document.querySelectorAll(".card").forEach((c,i)=>{
  if(answers[i]==undefined){
    c.classList.add("unanswered");
  }
 });

 if(unanswered>0){
  if(!confirm(unanswered+" unanswered. Submit anyway?")) return;
 }

 submitQuiz();
}

function submitQuiz(){

 clearInterval(timer);

 let correct=0,wrong=0,skip=0;

 all.forEach((q,i)=>{
  if(answers[i]==undefined) skip++;
  else if(answers[i]==q.ans) correct++;
  else wrong++;
 });

 let pct=(correct/150*100).toFixed(1);

 document.getElementById("quiz").style.display="none";

 let res=document.getElementById("result");
 res.style.display="block";

 res.innerHTML=`
  <div class="score">${correct}/150</div>
  <p>Correct: ${correct}</p>
  <p>Wrong: ${wrong}</p>
  <p>Skipped: ${skip}</p>
  <p>Percentage: ${pct}%</p>
  <button onclick="restart()">Restart</button>
 `;
}

// ================= RESET =================
function restart(){
 localStorage.removeItem("answers");
 location.reload();
}

</script>

</body>
</html>
